<!DOCTYPE html>
<html>
<head>
    <title>Iframe Tag Assignment</title>
</head>
<body>

    <h1>Embedding a Web Page Using Iframe</h1>
    <p>The webpage below is embedded using the iframe tag.</p>

    <iframe
        src="https://www.wikipedia.org/"
        width="800"
        height="500"
        frameborder="1"
        scrolling="yes">
    </iframe>

</body>
